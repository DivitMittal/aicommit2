name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        permissions:
            contents: write
            id-token: write
        outputs:
            new_release_published: ${{ steps.semantic.outputs.new_release_published }}
            new_release_version: ${{ steps.semantic.outputs.new_release_version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.PAT_TOKEN }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8
                  run_install: true

            - name: Semantic Release
              id: semantic
              uses: cycjimmy/semantic-release-action@v4
              env:
                  GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    compute-hashes:
        name: Compute Platform Hashes
        needs: release
        if: needs.release.outputs.new_release_published == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      platform: x86_64-linux
                      arch: x86_64
                    - os: ubuntu-latest
                      platform: aarch64-linux
                      arch: aarch64
                    - os: macos-latest
                      platform: x86_64-darwin
                      arch: x86_64
                    - os: macos-14
                      platform: aarch64-darwin
                      arch: aarch64

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.PAT_TOKEN }}
                  ref: main
                  fetch-depth: 0

            - name: Install Nix
              uses: cachix/install-nix-action@v26
              with:
                  nix_path: nixpkgs=channel:nixos-unstable
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Wait for NPM package availability
              run: |
                  VERSION="${{ needs.release.outputs.new_release_version }}"
                  MAX_ATTEMPTS=12
                  WAIT_SECONDS=10

                  echo "⏳ Waiting for npm package aicommit2@${VERSION} to be available..."

                  for attempt in $(seq 1 $MAX_ATTEMPTS); do
                    if npm view aicommit2@${VERSION} version >/dev/null 2>&1; then
                      echo "✅ Package aicommit2@${VERSION} is available on npm registry"
                      npm view aicommit2@${VERSION} version
                      exit 0
                    fi
                    echo "⏳ Attempt $attempt/$MAX_ATTEMPTS: Package not yet available, waiting ${WAIT_SECONDS}s..."
                    sleep $WAIT_SECONDS
                  done

                  echo "❌ Package aicommit2@${VERSION} not available after $((MAX_ATTEMPTS * WAIT_SECONDS)) seconds"
                  exit 1

            - name: Compute hash for ${{ matrix.platform }}
              run: |
                  VERSION="v${{ needs.release.outputs.new_release_version }}"
                  echo "🔨 Computing hash for platform: ${{ matrix.platform }}"

                  # Update version
                  sed -i "s/version = \".*\";/version = \"${VERSION}\";/" flake.nix
                  echo "✅ Updated version to: $VERSION"

                  # Build to get correct hash
                  MAX_ATTEMPTS=3
                  HASH=""

                  for attempt in $(seq 1 $MAX_ATTEMPTS); do
                    echo "🔨 Build attempt $attempt/$MAX_ATTEMPTS for ${{ matrix.platform }}..."
                    nix_output=$(nix build --print-out-paths .#packages.${{ matrix.platform }}.default 2>&1 || true)

                    # Try multiple patterns to extract hash
                    if [[ -z "$HASH" ]]; then
                      HASH=$(echo "$nix_output" | grep -oP '(?<=got:\s{0,5})sha256-[A-Za-z0-9+/=]{44}' | head -n1)
                      [[ -n "$HASH" ]] && echo "✅ Extracted hash using pattern 1 (got: ...): $HASH"
                    fi

                    if [[ -z "$HASH" ]]; then
                      HASH=$(echo "$nix_output" | grep -oP '(?<=got\s{1,5})sha256-[A-Za-z0-9+/=]{44}' | head -n1)
                      [[ -n "$HASH" ]] && echo "✅ Extracted hash using pattern 2 (got ...): $HASH"
                    fi

                    if [[ -z "$HASH" ]]; then
                      HASH=$(echo "$nix_output" | grep -oP 'sha256-[A-Za-z0-9+/=]{44}' | grep -v "PLACEHOLDER" | head -n1)
                      [[ -n "$HASH" ]] && echo "✅ Extracted hash using pattern 3 (any sha256): $HASH"
                    fi

                    if [[ -n "$HASH" && "$HASH" != *"PLACEHOLDER"* ]]; then
                      echo "✅ Successfully extracted hash: $HASH"
                      break
                    fi

                    HASH=""
                    echo "⚠️  Attempt $attempt failed to extract valid hash"
                    if [[ $attempt -lt $MAX_ATTEMPTS ]]; then
                      echo "🔄 Retrying in 5 seconds..."
                      sleep 5
                    fi
                  done

                  if [[ -z "$HASH" || "$HASH" == *"PLACEHOLDER"* ]]; then
                    echo "❌ Failed to extract valid hash after $MAX_ATTEMPTS attempts"
                    echo "📋 Nix build output:"
                    echo "$nix_output"
                    exit 1
                  fi

                  # Save hash to artifact
                  echo "${{ matrix.platform }}=${HASH}" >> hashes.txt
                  echo "✅ Computed hash for ${{ matrix.platform }}: $HASH"

            - name: Upload hash artifact
              uses: actions/upload-artifact@v4
              with:
                  name: hashes-${{ matrix.platform }}
                  path: hashes.txt

    update-nix:
        name: Update Nix Flake
        needs: [release, compute-hashes]
        if: needs.release.outputs.new_release_published == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.PAT_TOKEN }}
                  ref: main
                  fetch-depth: 0

            - name: Install Nix
              uses: cachix/install-nix-action@v26
              with:
                  nix_path: nixpkgs=channel:nixos-unstable
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Download all hash artifacts
              uses: actions/download-artifact@v4
              with:
                  path: hashes

            - name: Combine and update hashes
              run: |
                  VERSION="v${{ needs.release.outputs.new_release_version }}"
                  echo "📦 Updating flake.nix to version: $VERSION"

                  # Backup current flake.nix
                  cp flake.nix flake.nix.backup
                  echo "💾 Created backup: flake.nix.backup"

                  # Collect all hashes
                  for hash_file in hashes/hashes-*/hashes.txt; do
                    cat "$hash_file" >> combined_hashes.txt
                  done

                  echo "📋 Collected hashes:"
                  cat combined_hashes.txt

                  # Update version
                  sed -i "s/version = \".*\";/version = \"${VERSION}\";/" flake.nix
                  echo "✅ Updated version to: $VERSION"

                  # Update each platform's hash
                  while IFS='=' read -r platform hash; do
                    if [[ -n "$platform" && -n "$hash" ]]; then
                      sed -i "s|${platform} = \"sha256-[^\"]*\";|${platform} = \"${hash}\";|" flake.nix
                      echo "✅ Updated hash for ${platform}"
                    fi
                  done < combined_hashes.txt

                  # Validate the updated flake
                  echo "🔍 Validating flake.nix..."
                  if ! nix flake check --no-build 2>&1; then
                    echo "❌ Flake validation failed"
                    echo "🔙 Restoring backup..."
                    mv flake.nix.backup flake.nix
                    exit 1
                  fi

                  echo "✅ Flake validation successful"
                  echo "🗑️  Removing backup..."
                  rm -f flake.nix.backup

                  # Show diff for verification
                  echo "📝 Changes made:"
                  git diff flake.nix

                  echo "✅ Update complete: $VERSION"

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if git diff --quiet flake.nix; then
                    echo "No changes to commit"
                    exit 0
                  fi

                  git add flake.nix
                  git commit -m "chore(nix): update flake.nix to version v${{ needs.release.outputs.new_release_version }} [skip ci]"
                  git push origin main
